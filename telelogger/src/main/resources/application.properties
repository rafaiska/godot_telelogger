spring.application.name=telelogger
server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/telelogger}
spring.datasource.username=${DATABASE_USERNAME:telelogger}
spring.datasource.password=${DATABASE_PASSWORD:telelogger}
spring.datasource.hikari.maximum-pool-size=${DATABASE_MAX_POOL_SIZE:5}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jackson.property-naming-strategy=SNAKE_CASE

spring.flyway.enabled=true
